<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>相亲模拟器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-card: #16213e;
            --bg-elevated: #1f2b47;
            --accent-primary: #e94560;
            --accent-secondary: #0f3460;
            --accent-option: #533483;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #6b7280;
            --positive: #4ade80;
            --negative: #f87171;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            background: linear-gradient(180deg, var(--bg-primary) 0%, #0f0f1a 100%);
        }

        .screen {
            display: none;
            padding: 20px;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3rem;
            text-align: center;
            margin-top: 60px;
            background: linear-gradient(135deg, var(--accent-primary), #ff8a9b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
        }

        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 20px 0 40px;
            min-height: 30px;
            font-style: italic;
        }

        .main-btn {
            background: linear-gradient(135deg, var(--accent-primary), #ff6b8a);
            border: none;
            color: white;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.4);
            display: block;
            margin: 20px auto;
        }

        .main-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(233, 69, 96, 0.5);
        }

        .main-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .stats {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: auto;
            padding-bottom: 20px;
        }

        .history-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--accent-secondary);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .history-btn:hover {
            background: var(--accent-secondary);
            color: var(--text-primary);
        }

        .character-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 30px 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .character-avatar {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
            width: 120px;
            height: 120px;
            margin-left: auto;
            margin-right: auto;
        }

        .character-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-primary);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .character-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .character-tag {
            color: var(--accent-primary);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .intro-btn {
            background: var(--accent-secondary);
            border: none;
            color: var(--text-primary);
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .intro-btn:hover {
            background: #1a4a7a;
            transform: scale(1.05);
        }

        .intro-btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reroll-btn {
            background: transparent;
            border: 2px solid var(--accent-secondary);
            color: var(--text-secondary);
            padding: 12px 20px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reroll-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-img {
            max-width: 80vw;
            max-height: 70vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .intro-text {
            line-height: 1.8;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .chat-header {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .chat-avatar {
            font-size: 2.2rem;
            width: 45px;
            height: 45px;
            flex-shrink: 0;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-primary);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .favorability {
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .favorability.positive {
            color: var(--positive);
        }

        .favorability.negative {
            color: var(--negative);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .favorability.changed {
            animation: pulse 0.3s ease;
        }

        .chat-history {
            flex: 1;
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            max-height: 50vh;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
        }

        .message.them {
            align-self: flex-start;
            background: var(--accent-secondary);
            border-bottom-left-radius: 4px;
        }

        .message.you {
            align-self: flex-end;
            background: var(--accent-option);
            border-bottom-right-radius: 4px;
        }

        .message-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: var(--bg-elevated);
            border: 2px solid var(--accent-option);
            color: var(--text-primary);
            padding: 14px 20px;
            font-size: 0.95rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            background: var(--accent-option);
            transform: translateX(5px);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .ending-screen {
            text-align: center;
            padding-top: 40px;
        }

        .ending-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--accent-primary);
        }

        .ending-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .ending-stats {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }

        .share-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
            border-radius: 20px;
            padding: 25px;
            margin: 20px auto;
            max-width: 350px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        .share-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 15px;
            font-family: 'Ma Shan Zheng', cursive;
        }

        .share-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--accent-secondary);
        }

        .share-avatar {
            font-size: 2.5rem;
            width: 50px;
            height: 50px;
            flex-shrink: 0;
        }

        .share-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-primary);
        }

        .share-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .share-ending {
            color: var(--accent-primary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .share-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .share-tagline {
            background: var(--accent-primary);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .share-qrcode {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--accent-secondary);
        }

        .share-qrcode img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
        }

        .share-qrcode-tip {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .share-footer {
            margin-top: 15px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .secondary-btn {
            background: var(--bg-card);
            border: 2px solid var(--accent-secondary);
            color: var(--text-primary);
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secondary-btn:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--accent-secondary);
        }

        .history-item:hover {
            background: var(--bg-elevated);
            transform: translateX(5px);
        }

        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .history-favorability {
            font-weight: 700;
        }

        .history-ending {
            font-size: 0.9rem;
            color: var(--accent-primary);
        }

        .back-btn {
            background: var(--accent-secondary);
            border: none;
            color: var(--text-primary);
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #1a4a7a;
        }

        .screen-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-primary);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
        }

        .detail-header {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }

        .detail-avatar {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .detail-info {
            margin-bottom: 15px;
        }

        .detail-ending {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .detail-chat {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            opacity: 1;
        }

        .progress-bar {
            height: 4px;
            background: var(--bg-card);
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-option));
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="toast" id="toast"></div>
        
        <div class="modal" id="avatar-modal" onclick="closeAvatarModal()">
            <span class="modal-close">&times;</span>
            <img class="modal-img" id="modal-avatar-img" src="" alt="大图预览">
        </div>

        <div class="screen active" id="start-screen">
            <button class="history-btn" onclick="showHistoryList()">📜 历史记录</button>
            <h1 class="title">相亲模拟器</h1>
            <p class="subtitle" id="subtitle"></p>
            <button class="main-btn" onclick="startGame()">开始相亲</button>
            <p class="stats" id="stats">今日已有 <span id="people-count">0</span> 人成功被拉黑</p>
        </div>

        <div class="screen" id="match-screen">
            <div class="character-card">
                <div class="character-avatar" id="character-avatar">😐</div>
                <h2 class="character-name" id="character-name">加载中...</h2>
                <p class="character-tag" id="character-tag">标签</p>
                <div class="intro-btn-row">
                    <button class="intro-btn" onclick="showIntro()">点击查看对方的自我介绍</button>
                    <button class="reroll-btn" onclick="rerollCharacter()">换一个</button>
                </div>
            </div>
            <button class="main-btn" id="start-chat-btn" onclick="startChat()">开始对话</button>
        </div>

        <div class="modal" id="intro-modal">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">×</button>
                <p class="intro-text" id="intro-text"></p>
            </div>
        </div>

        <div class="screen" id="chat-screen">
            <div class="chat-header">
                <span class="chat-avatar" id="chat-avatar">😐</span>
                <div class="chat-info">
                    <div class="chat-name" id="chat-name">对方</div>
                    <div class="favorability" id="favorability">好感度: 0</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="chat-history" id="chat-history"></div>
            <div class="options" id="options"></div>
        </div>

        <div class="screen" id="ending-screen">
            <div class="ending-screen">
                <h2 class="ending-title" id="ending-title">结局名称</h2>
                <p class="ending-desc" id="ending-desc"></p>
                <p class="ending-stats">最终好感度: <span id="final-favorability">0</span></p>
                
                <div class="share-card" id="share-card">
                    <div class="share-title">🎭 抽象相亲模拟器</div>
                    <div class="share-header">
                        <span class="share-avatar" id="share-avatar">😐</span>
                        <span class="share-name" id="share-name">对方</span>
                    </div>
                    <p class="share-ending" id="share-ending">结局</p>
                    <p class="share-desc" id="share-desc">描述</p>
                    <div class="share-tagline" id="share-tagline">这次的相亲居然...</div>
                    <div class="share-qrcode">
                        <img id="share-qrcode-img" src="" alt="扫码继续">
                        <p class="share-qrcode-tip">扫码开始你的抽象相亲</p>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="main-btn" onclick="copyShareCard()">📋 复制分享</button>
                    <button class="secondary-btn" onclick="restartGame()">再相一次</button>
                </div>
            </div>
        </div>

        <div class="screen" id="history-list-screen">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <h2 class="screen-title">相亲历史</h2>
            <div class="history-list" id="history-list"></div>
        </div>

        <div class="screen" id="history-detail-screen">
            <button class="back-btn" onclick="showHistoryList()">← 返回</button>
            <h2 class="screen-title">相亲详情</h2>
            <div class="detail-header" id="detail-header"></div>
            <div class="detail-chat" id="detail-chat"></div>
        </div>
    </div>

    <script>
        const SUBTITLES = [
            "今天你相了吗？",
            "对方正在输入… 你的葬礼致辞",
            "本游戏已获国家反诈中心友情提示",
            "建议在闺蜜陪同下游玩",
            "每局都会有一个正常人受伤",
            "你的下一个对象，何必是个人",
            "相亲市场的最后一根救命稻草"
        ];

        const SHARE_TAGS = [
            "快逃！！！🆘",
            "建议下载国家反诈中心APP",
            "这人现在还在给我发消息",
            "我的母单历史刷新了",
            "相亲PTSD已触发",
            "月老：这单我不管了",
            "丘比特：抱歉射歪了"
        ];

        const CHARACTERS = [
            {
                id: 1,
                name: "昵称：币圈陈总",
                tag: "币圈大佬，只差你一个",
                avatar: "币圈陈总.png",
                initialFavorability: 40,
                intro: "我是做区块链的，圈里人都叫我'陈总'。目前手上管着几个亿的盘子，保时捷刚换了一辆新的。我不喜欢太物质的女生，但你得懂我的事业。跟我在一起，以后你就是老板娘。对了，方便的话可以先借我两万块周转一下吗？很快还你。",
                opening: "你们约在星巴克见面。他迟到15分钟，进门时故意晃了晃手里的保时捷钥匙（可能是借的），然后坐下来第一句话就是：'我刚开完一个亿的会。'",
                endings: {
                    high: { title: '糖衣炮弹', desc: '你对他礼貌客气，他觉得你是个好骗的目标。你们加了微信，他开始每天给你发早安晚安和投资项目。你渐渐被他的"真诚"打动，投了5000块试水。第一个月他真的返了你1000，你兴奋地又投了5万。然后他消失了，微信不回，电话停机。你去报警，警察说："又是这个陈总，你是第18个了。"你蹲在派出所门口，哭都哭不出来。' },

                        { text: "那你写了吗？念给我听听，我帮你改改。", feedback: "他清了清嗓子，用一种话剧腔念道：\"你迟到的三分钟/咖啡凉了/我的心也凉了/但太阳还热着。\"念完后他紧张地看着你，\"怎么样？是不是很有深度？\"你忍住笑，他以为你被感动了。", favor: -10 },

                        { text: "可以，但你要用一首诗来换。必须是原创。", feedback: "他皱眉思考了三十秒，然后念道：\"咖啡是黑的/你的心是亮的/我的口袋是空的。\"念完他得意地看着你，\"怎么样？存在主义风格。\"你给了他一杯白开水。", favor: -15 },

                    { them: "我最近写了一首长诗，关于生命的虚无。", options: [

                        { text: "对，我在看你怎么这么自恋。", feedback: "他哈哈大笑，拍了一下大腿。\"自恋？我这叫自信！健身的人都有自信！\"他站起来转了一圈，\"你看我这身材，不值得自恋吗？\"旁边的顾客都投来奇怪的目光。", favor: 20 },

                        { text: "你先把自己的斜方肌练小点吧，太丑了。", feedback: "他摸了摸自己的脖子，一脸困惑。\"斜方肌？那是我的骄傲！很多人还练不出来呢！\"他歪着头，\"你觉得丑？那你帮我按按，按小了我就听你的！\"他把脖子伸过来，你一巴掌把他推回去。", favor: 25 }

                dialogues: [
                    { them: "你比照片好看，是不是P图没加载完？", options: [
                        { text: "你比照片搞笑。", feedback: "他哈哈大笑，拍了一下桌子。\"这个梗好！我喜欢！\"他擦了擦笑出来的眼泪，\"看来你也是幽默的人，我们合得来。\"他冲你竖起大拇指。", favor: 10 },
                        { text: "你段子太冷了。", feedback: "他假装伤心，捂住胸口。\"你伤害了我。我本来想用这个梗开场，结果被你反杀了。\"他叹了口气，\"看来我还要再练练。\"他喝了一口咖啡，表情委屈。", favor: -10 },

                    { them: "我没上过开放麦，但我有天赋。", options: [
                        { text: "加油，以后上台我叫朋友去看。", feedback: "他感动地点头，眼睛亮晶晶的。\"真的？那我要好好写了。\"他掏出手机备忘录，上面密密麻麻写满了段子，\"你看，我每天都在积累素材。\"你翻了翻，有几个还挺好笑的。", favor: 10 },
                        { text: "天赋？你先把今天的咖啡钱讲出来。", feedback: "他愣了一下，然后清了清嗓子。\"咳嗽，各位观众，今天我要讲一个关于咖啡的故事……\"他讲了30秒，你一点没笑。他尴尬地挠头，\"看来这个段子不行，我改天再练。\"", favor: -10 },
                        { text: "没上过台的天赋等于没有天赋。", feedback: "他有点受伤，低头看着咖啡杯。\"你说得对，天赋需要舞台证明。\"他顿了顿，\"我下次开放麦一定去，你来看吗？\"他期待地看着你，你还没回答，他又说，\"算了，我可能紧张得说不出来。\"", favor: -20 }

                    { them: "我最大的优点是不冷场，因为我话多。", options: [

                    { them: "你平时看脱口秀吗？喜欢谁？", options: [

                        { text: "我只喜欢看人摔倒的视频。", feedback: "他愣了一下，然后哈哈大笑。\"那个我也喜欢！\"他掏出手机，\"你看，我收藏了好多。\"他给你看一个视频，一个人踩到香蕉皮滑倒。你笑了，他也笑了，\"看来我们笑点一致。\"", favor: -20 }

                    { them: "我最近写了一个段子，关于相亲的，要听吗？", options: [

                    { them: "我收入不稳定，但开心最重要。", options: [

                        { text: "那你去找个让你开心的富婆吧。", feedback: "他愣了一下，然后苦笑。\"富婆看不上我。我连自己都养不活。\"他自嘲地笑了笑，\"我还是靠自己吧，穷开心。\"他端起咖啡杯，一饮而尽。", favor: -25 }

                    { them: "我觉得我们挺聊得来的。", options: [

            {

                    { them: "我是工地的测量员，每天和钢筋混凝土打交道。", options: [

                        { text: "那你的手一定很粗糙吧？", feedback: "他低头看了看自己的手，手背上有老茧和一道小伤疤。\"嗯，是有点糙。不过不影响干活。\"他把手缩到桌下，\"你是不是嫌弃？\"他小心翼翼地看着你。", favor: -5 },

                    { them: "你平时喜欢做什么？我周末有空。", options: [
                        { text: "看电影、逛公园都可以。", feedback: "他高兴地点头。\"我也喜欢逛公园！免费的，还能晒太阳。\"他笑了，\"那周末一起去？我知道一个公园，很大，还有湖。\"他期待地看着你。", favor: 10 },
                        { text: "喜欢花钱，你请得起吗？", feedback: "他摸了摸口袋，有点为难。\"我……我请不起贵的，但便宜的可以。\"他顿了顿，\"你想去商场吗？我可以陪你逛，不买东西。\"他不好意思地笑了笑。", favor: -15 },
                        { text: "喜欢在家躺着，你别来打扰。", feedback: "他愣住了，然后点头。\"好，我不打扰你。\"他低头喝咖啡，不再说话。气氛有点冷。", favor: -20 }
                    ]},
                    { them: "我没什么文化，但我会努力对你好。", options: [
                        { text: "人品比学历重要。", feedback: "他眼眶有点红，吸了吸鼻子。\"谢谢你。我学历不高，高中毕业就出来打工了。\"他低头，\"但我不会偷不会抢，靠力气吃饭。\"他抬头看你，眼神真诚。", favor: 10 },
                        { text: "没文化？那你初中毕业了吗？", feedback: "他低下头，声音变小。\"高中毕业，没考上大学。\"他顿了顿，\"是不是觉得我不配？\"他紧张地看着你，手指绞着衣角。", favor: -15 },
                        { text: "对你好？拿什么对你好？工资卡？", feedback: "他愣住了，然后慢慢低下头。\"你说得对，我没什么能给你的。\"他站起来，\"对不起，我走了。\"你赶紧拉住他，说你不是那个意思。", favor: -25 }
                    ]},
                    { them: "今天谢谢你愿意和我聊天，我很开心。", options: [
                        { text: "也是，你人很好。", feedback: "他笑了，眼睛弯成月牙，憨厚的样子让你心头一暖。\"那……那我们还能再聊吗？\"他期待地看着你，像个等待答案的孩子。你点头，他高兴得差点跳起来。", favor: 15 },
                        { text: "开心？那下次你请我吃大餐。", feedback: "他点头，掏出手机看余额。\"行。你想吃什么？不要太贵就行。\"他算了算，\"下周末我发工资，请你吃火锅？\"他期待地看着你。", favor: -5 },
                        { text: "其实我一直在忍耐。", feedback: "他愣住了，笑容凝固在脸上。\"忍……忍耐？\"他低下头，\"对不起，我太土了，让你不舒服。\"他拿起包，\"我以后不打扰你了。\"他快步走出咖啡店，你透过玻璃看到他蹲在门口，好像很难过。", favor: -25 }
                    ]}
                ]
            }
        ];

        let currentCharacter = null;
        let currentDialogueIndex = 0;
        let currentCharacterIndex = 0;
        let characterOrder = [];
        let favorability = 0;
        let chatHistory = [];

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function getRandomSubtitle() {
            return SUBTITLES[Math.floor(Math.random() * SUBTITLES.length)];
        }

        function getRandomStats() {
            return Math.floor(Math.random() * (50000 - 5000) + 5000);
        }

        function init() {
            characterOrder = [...Array(CHARACTERS.length).keys()];
            for (let i = characterOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [characterOrder[i], characterOrder[j]] = [characterOrder[j], characterOrder[i]];
            }
            currentCharacterIndex = 0;
            document.getElementById('subtitle').textContent = getRandomSubtitle();
            document.getElementById('people-count').textContent = getRandomStats().toLocaleString();
        }

        function startGame() {
            currentCharacter = CHARACTERS[characterOrder[currentCharacterIndex]];
            currentDialogueIndex = 0;
            favorability = currentCharacter.initialFavorability !== undefined ? currentCharacter.initialFavorability : 40;
            chatHistory = [];
            
            renderAvatar('character-avatar', currentCharacter.avatar);
            document.getElementById('character-name').textContent = currentCharacter.name;
            document.getElementById('character-tag').textContent = currentCharacter.tag;
            document.getElementById('intro-text').textContent = currentCharacter.intro;
            
            showScreen('match-screen');
        }

        function rerollCharacter() {
            currentCharacterIndex = (currentCharacterIndex + 1) % CHARACTERS.length;
            currentCharacter = CHARACTERS[characterOrder[currentCharacterIndex]];
            currentDialogueIndex = 0;
            favorability = currentCharacter.initialFavorability !== undefined ? currentCharacter.initialFavorability : 40;
            chatHistory = [];
            
            renderAvatar('character-avatar', currentCharacter.avatar);
            document.getElementById('character-name').textContent = currentCharacter.name;
            document.getElementById('character-tag').textContent = currentCharacter.tag;
            document.getElementById('intro-text').textContent = currentCharacter.intro;
            
            showToast('已更换相亲对象！');
        }

        function showIntro() {
            document.getElementById('intro-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('intro-modal').classList.remove('active');
        }

        function startChat() {
            renderAvatar('chat-avatar', currentCharacter.avatar);
            document.getElementById('chat-name').textContent = currentCharacter.name;
            updateFavorabilityDisplay();
            
            chatHistory = [];
            addSystemMessage(currentCharacter.opening);
            showDialogue();
            showScreen('chat-screen');
        }

        function updateFavorabilityDisplay() {
            const el = document.getElementById('favorability');
            const sign = favorability >= 0 ? '+' : '';
            el.textContent = `好感度: ${sign}${favorability}`;
            el.className = 'favorability ' + (favorability >= 0 ? 'positive' : 'negative');
            el.classList.add('changed');
            setTimeout(() => el.classList.remove('changed'), 300);
        }

        function addSystemMessage(text) {
            chatHistory.push({ type: 'system', text });
            renderChatHistory();
        }

        function addTheirMessage(text) {
            chatHistory.push({ type: 'them', text });
            renderChatHistory();
        }

        function addYourMessage(text) {
            chatHistory.push({ type: 'you', text });
            renderChatHistory();
        }

        function renderChatHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = chatHistory.map(msg => {
                const label = msg.type === 'system' ? '' : (msg.type === 'them' ? '对方' : '你');
                return `<div class="message ${msg.type}">
                    ${label ? `<div class="message-label">${label}</div>` : ''}
                    ${msg.text}
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
            
            const progress = (currentDialogueIndex / currentCharacter.dialogues.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        function showDialogue() {
            if (currentDialogueIndex >= currentCharacter.dialogues.length) {
                showEnding();
                return;
            }

            const dialogue = currentCharacter.dialogues[currentDialogueIndex];
            addTheirMessage(dialogue.them);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = dialogue.options.map((opt, i) => 
                `<button class="option-btn" onclick="chooseOption(${i})">${opt.text}</button>`
            ).join('');
        }

        function chooseOption(optionIndex) {
            const dialogue = currentCharacter.dialogues[currentDialogueIndex];
            const option = dialogue.options[optionIndex];
            
            addYourMessage(option.text);
            favorability = Math.max(-100, Math.min(100, favorability + option.favor));
            updateFavorabilityDisplay();
            
            document.getElementById('options').innerHTML = '';
            
            if (option.feedback) {
                chatHistory.push({ type: 'system', text: option.feedback });
                renderChatHistory();
            }
            
            currentDialogueIndex++;
            
            setTimeout(() => {
                if (currentDialogueIndex < currentCharacter.dialogues.length) {
                    showDialogue();
                } else {
                    showEnding();
                }
            }, 1500);
        }

        function showEnding() {
            let ending;
            if (favorability >= 60) {
                ending = currentCharacter.endings.high;
            } else if (favorability <= -21) {
                ending = currentCharacter.endings.low;
            } else {
                ending = currentCharacter.endings.medium;
            }

            document.getElementById('ending-title').textContent = ending.title;
            document.getElementById('ending-desc').textContent = ending.desc;
            document.getElementById('final-favorability').textContent = (favorability >= 0 ? '+' : '') + favorability;
            document.getElementById('final-favorability').className = favorability >= 0 ? 'positive' : 'negative';

            renderAvatar('share-avatar', currentCharacter.avatar);
            document.getElementById('share-name').textContent = currentCharacter.name;
            document.getElementById('share-ending').textContent = ending.title;
            document.getElementById('share-desc').textContent = ending.desc;
            document.getElementById('share-tagline').textContent = SHARE_TAGS[Math.floor(Math.random() * SHARE_TAGS.length)];
            
            document.getElementById('share-qrcode-img').src = 'qrcode.png';

            saveToHistory(ending.title);
            showScreen('ending-screen');
        }

        function saveToHistory(endingTitle) {
            const history = JSON.parse(localStorage.getItem('相亲历史') || '[]');
            history.unshift({
                id: Date.now(),
                characterId: currentCharacter.id,
                characterName: currentCharacter.name,
                characterAvatar: currentCharacter.avatar,
                favorability: favorability,
                ending: endingTitle,
                chatHistory: chatHistory,
                time: new Date().toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem('相亲历史', JSON.stringify(history.slice(0, 50)));
        }

        function copyShareCard() {
            const card = document.getElementById('share-card');
            
            showToast('正在生成图片...');
            
            html2canvas(card, {
                backgroundColor: '#16213e',
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `相亲模拟器_${currentCharacter.name}_${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('图片已保存，快去分享吧！');
                }, 'image/png');
            }).catch(err => {
                console.error(err);
                copyTextOnly();
            });
        }

        function copyTextOnly() {
            const text = `
《相亲模拟器》
${currentCharacter.avatar} ${currentCharacter.name}
最终好感度: ${favorability >= 0 ? '+' : ''}${favorability}
结局: ${document.getElementById('ending-title').textContent}
${document.getElementById('ending-desc').textContent}
${document.getElementById('share-tagline').textContent}
扫码开始你的抽象相亲
            `.trim();
            
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('复制成功！快去分享给闺蜜吧～');
            } catch (err) {
                showToast('复制失败，请手动复制');
            }
            document.body.removeChild(textarea);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function renderAvatar(elementId, avatar) {
            const el = document.getElementById(elementId);
            if (avatar && avatar.endsWith('.png')) {
                el.innerHTML = `<img src="${avatar}" onclick="showAvatarModal('${avatar}')" alt="头像">`;
            } else {
                el.textContent = avatar;
            }
        }

        function showAvatarModal(src) {
            const modal = document.getElementById('avatar-modal');
            const img = document.getElementById('modal-avatar-img');
            img.src = src;
            modal.classList.add('active');
        }

        function closeAvatarModal() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('active');
        }

        function restartGame() {
            startGame();
        }

        function showHistoryList() {
            const history = JSON.parse(localStorage.getItem('相亲历史') || '[]');
            const container = document.getElementById('history-list');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有相亲记录<br>快去开始你的第一次相亲吧！</div>';
            } else {
                container.innerHTML = history.map(item => `
                    <div class="history-item" onclick="showHistoryDetail(${item.id})">
                        <div class="history-item-header">
                            <span class="history-time">${item.time}</span>
                            <span class="history-favorability ${item.favorability >= 0 ? 'positive' : 'negative'}">${item.favorability >= 0 ? '+' : ''}${item.favorability}</span>
                        </div>
                        <div>${item.characterAvatar} ${item.characterName}</div>
                        <div class="history-ending">${item.ending}</div>
                    </div>
                `).join('');
            }
            
            showScreen('history-list-screen');
        }

        function showHistoryDetail(id) {
            const history = JSON.parse(localStorage.getItem('相亲历史') || '[]');
            const item = history.find(h => h.id === id);
            if (!item) return;

            document.getElementById('detail-header').innerHTML = `
                <div class="detail-avatar">${item.characterAvatar}</div>
                <div class="detail-info">
                    <div>${item.characterName}</div>
                    <div class="detail-ending">${item.ending}</div>
                    <div class="favorability ${item.favorability >= 0 ? 'positive' : 'negative'}">好感度: ${item.favorability >= 0 ? '+' : ''}${item.favorability}</div>
                </div>
            `;

            const chatContainer = document.getElementById('detail-chat');
            chatContainer.innerHTML = item.chatHistory.map(msg => {
                const label = msg.type === 'system' ? '' : (msg.type === 'them' ? '对方' : '你');
                return `<div class="message ${msg.type}">
                    ${label ? `<div class="message-label">${label}</div>` : ''}
                    ${msg.text}
                </div>`;
            }).join('');

            showScreen('history-detail-screen');
        }

        function goBack() {
            showScreen('start-screen');
        }

        init();
    </script>
</body>
</html>
